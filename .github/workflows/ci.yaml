name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  quality:
    name: PHP ${{ matrix.php }} quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.4"
          - "8.5"

    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install package dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install quality tools
        run: composer tools:install

      - name: Audit dependencies
        run: |
          composer audit --no-interaction
          composer audit --working-dir=tools/phpstan --no-interaction
          composer audit --working-dir=tools/php-cs-fixer --no-interaction

      - name: Run quality checks
        run: composer check
