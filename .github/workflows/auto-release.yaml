name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - master

permissions:
  contents: read

jobs:
  release:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out the verified revision
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Read and validate the version
        id: version
        run: |
          VERSION=$(jq -er '.version' composer.json)
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "composer.json contains an invalid release version: $VERSION" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Check the release tag
        id: tag
        run: |
          if git rev-parse --verify --quiet "refs/tags/${{ steps.version.outputs.value }}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Create the release
        if: steps.tag.outputs.exists == 'false'
        run: >-
          gh release create "${{ steps.version.outputs.value }}"
          --target "${{ github.event.workflow_run.head_sha }}"
          --title "Release ${{ steps.version.outputs.value }}"
          --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
